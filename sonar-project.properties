# SonarQube Configuration for Smashly App
sonar.projectKey=smashly-app
sonar.projectName=Smashly - Padel Rackets App
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend/api/src,frontend/src
sonar.tests=backend/api/src/__tests__,frontend/src/__tests__

# Language settings
sonar.typescript.node.maxspace=8192

# Test execution reports
sonar.typescript.lcov.reportPaths=backend/api/coverage/lcov.info,frontend/coverage/lcov.info
sonar.junit.reportPaths=backend/api/test-results.xml,frontend/test-results.xml

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/__tests__/**

# Quality Gate
sonar.qualitygate.wait=true

# Code duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx

# Analysis settings
sonar.sourceEncoding=UTF-8